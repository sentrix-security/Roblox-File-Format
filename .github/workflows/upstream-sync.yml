name: Sync upstream and open PR

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/MaximumADHD/Roblox-File-Format.git
          git fetch upstream --prune
          git fetch origin --prune

      - name: Create or update sync branch
        run: |
          BASE_BRANCH="main"
          UPSTREAM_BRANCH="main"
          SYNC_BRANCH="sync/upstream"

          git checkout -B "$SYNC_BRANCH" "origin/$BASE_BRANCH"

          # Merge upstream into the sync branch. If conflicts occur, this step fails (which is good).
          git merge --no-edit "upstream/$UPSTREAM_BRANCH"

          # Push the sync branch
          git push -u origin "$SYNC_BRANCH" --force-with-lease

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if upstream is actually ahead before doing anything
          AHEAD=$(git rev-list --right-only --count origin/main...origin/sync/upstream)
          echo "sync/upstream is $AHEAD commits ahead of main"
          
          if [ "$AHEAD" -eq 0 ]; then
            echo "Nothing to sync, skipping PR."
            exit 0
          fi
      
          gh pr create \
            --head sync/upstream \
            --base main \
            --title "Sync upstream changes" \
            --body "Automated PR to bring upstream changes into this fork." \
            --label upstream-sync \
          || echo "PR already exists, skipping."
